name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed config
        run: cp config.example.json config.json

      - name: Compile Python
        run: python -m compileall scripts

      - name: Smoke check run context
        run: python scripts/20_run_context.py start https://your-authorized-domain.example
